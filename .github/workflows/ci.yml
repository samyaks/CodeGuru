name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: Typecheck & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (client)
        working-directory: app/client
        run: npx tsc --noEmit

      - name: Build client
        working-directory: app/client
        run: npm run build

      - name: Verify server loads
        working-directory: app
        run: node -e "require('./server/routes/analyze'); require('./server/routes/reviews'); require('./server/routes/takeoff'); require('./server/routes/deploy'); require('./server/routes/projects'); require('./server/routes/build-story'); require('./server/routes/public-story'); console.log('Server modules OK')"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: typecheck-and-build

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t codeguru:${{ github.sha }} .

      - name: Smoke test container
        run: |
          docker run -d --name codeguru-test \
            -p 3001:3001 \
            -e ANTHROPIC_API_KEY=test-key \
            codeguru:${{ github.sha }}
          sleep 5
          curl -sf http://localhost:3001/health
          docker stop codeguru-test
