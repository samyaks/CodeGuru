# Enums must match https://backboard.railway.app/railway.schema.json
# (uppercase). Invalid values break config parsing and fail during
# "Initialization › Snapshot code" before the Docker build starts.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
# 60s gives migrate.js cold-start + app boot plenty of headroom on Supabase's
# session pooler. /health itself is a liveness-only probe (no DB call) so
# this mostly covers the time between container start and app.listen().
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
