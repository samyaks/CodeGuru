app = "codeguru"
primary_region = "sjc"
# Data lives in Supabase Postgres (DATABASE_URL); no local volume needed.

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true

[checks]
  [checks.health]
    type = "http"
    port = 3001
    path = "/health"
    interval = "30s"
    timeout = "5s"
